# Role Raider search configuration — Archa Narayan S
# Profile: Associate Product Manager / Product Manager
# Focus: Growth, Analytics, B2B SaaS, Consumer tech — India + Remote

# Search queries — tiered by precision
# Tier 1: Exact title matches (highest precision, searched first)
# Tier 2: Broader PM variations and adjacent high-fit roles
# Tier 3: Wide net — strategic/analytics roles that PMs often come from
queries:
  - query: "associate product manager"
    tier: 1
  - query: "APM product manager"
    tier: 1
  - query: "product manager"
    tier: 1
  - query: "product manager growth"
    tier: 1
  - query: "product manager analytics"
    tier: 1
  - query: "product manager B2B SaaS"
    tier: 2
  - query: "product manager consumer"
    tier: 2
  - query: "product manager fintech"
    tier: 2
  - query: "product manager marketplace"
    tier: 2
  - query: "growth product manager"
    tier: 2
  - query: "product analyst"
    tier: 2
  - query: "product strategy analyst"
    tier: 2
  - query: "technical product manager"
    tier: 2
  - query: "strategy and operations"
    tier: 3
  - query: "business analyst product"
    tier: 3
  - query: "product operations manager"
    tier: 3
  - query: "growth analyst"
    tier: 3
  - query: "product manager entry level"
    tier: 3

# Locations — India-focused with remote
locations:
  - location: "Bengaluru, Karnataka"
    remote: false
  - location: "Mumbai, Maharashtra"
    remote: false
  - location: "Gurugram, Haryana"
    remote: false
  - location: "Hyderabad, Telangana"
    remote: false
  - location: "Chennai, Tamil Nadu"
    remote: false
  - location: "Remote"
    remote: true

# Location filtering — what to accept and reject in job location text
location:
  accept_patterns:
    - "Bangalore"
    - "Bengaluru"
    - "Mumbai"
    - "Bombay"
    - "Delhi"
    - "NCR"
    - "Gurgaon"
    - "Gurugram"
    - "Noida"
    - "Hyderabad"
    - "Chennai"
    - "Pune"
    - "India"
    - "Remote"
    - "Anywhere"
    - "Hybrid"
  reject_patterns:
    - "United States only"
    - "US only"
    - "UK only"
    - "Europe only"
    - "Must be based in US"
    - "onsite only Singapore"
    - "onsite only London"
    - "onsite only Dubai"

# Country for Indeed/LinkedIn/Google Jobs searches
country: "India"

# Job boards
boards:
  - linkedin
  - indeed
  - glassdoor
  - google

# Search defaults
defaults:
  results_per_site: 75    # Per board per query
  hours_old: 168          # 1 week — broader net for PM roles (posted less frequently than eng)

# Title exclusions — skip roles that are clearly out of scope
exclude_titles:
  - "senior director"
  - "VP "
  - "vice president"
  - "chief product"
  - "CPO"
  - "head of product"
  - "principal product"
  - "staff product"
  - "director of product"
  - "software engineer"
  - "data engineer"
  - "ML engineer"
  - "frontend"
  - "backend"
  - "fullstack"
  - "DevOps"
  - "SRE"
  - "QA engineer"
  - "test engineer"
  - "clearance required"
  - "TS/SCI"
